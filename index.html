         env(safe-area-inset-*) paddings in style.css take effect (they

         opts out of browser gestures via touch-action, not the viewport. -->

    <link rel="icon" href="/assets/aura_favicon.png" type="image/x-icon">
    <title>Aura - Play MTG, Instantly</title>
    <meta name="description" content="The fastest way to play Magic. No accounts, no downloads. Just instantaneous magic.
    Aura is the sleekest, fastest fan-made app you've ever seen.">
  </head>
