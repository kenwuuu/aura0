name: vitest Tests

on:
  # Feature branches get CI via their PR (below); push-triggered runs are
  # scoped to master so a branch with an open PR doesn't run the whole job
  # matrix twice for the same commit (push + pull_request synchronize).
  push:
    branches: [master]
  pull_request:
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:run

      - name: Run coverage thresholds
        run: npm run test:coverage

  e2e-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # The multiplayer specs sync through a relay Playwright boots locally (see
      # playwright.config.ts). Installed from the relay's own lockfile, which pins
      # @y/websocket-server exactly — the root manifest's caret resolves to a version
      # that hands back empty boards.
      - name: Install relay dependencies
        run: npm --prefix networking/websocket ci

      - name: Run @smoke E2E suite
        run: npm run test:e2e:smoke

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

  # Drives the *production* bundle (vite build → vite preview) at a phone
  # viewport, so layout regressions the minifier introduces are caught here
  # instead of on the deployed site. The dev-server lanes above serve the
  # unminified CSS and can't see them. Self-contained: the preview config
  # builds + serves the app itself and the spec is single-player, so no relay.
  e2e-preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run production-build preview E2E suite
        run: npm run test:e2e:preview

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-preview
          path: playwright-report-preview/
          retention-days: 7

  e2e-full:
    runs-on: ubuntu-latest
    # Blocking on the production gate, advisory everywhere else. A PR targeting
    # `master` (the staging→master promotion) must pass this suite — it is a
    # required check on `master`. For feature→staging PRs and post-merge pushes
    # it stays advisory while it earns a longer flake-free track record, so a
    # flake there never blocks day-to-day work (see
    # claude_plans/e2e_harness_progress.md). `github.base_ref` is the PR's
    # target branch and is empty for push events.
    continue-on-error: ${{ github.base_ref != 'master' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # The multiplayer specs sync through a relay Playwright boots locally (see
      # playwright.config.ts). Installed from the relay's own lockfile, which pins
      # @y/websocket-server exactly — the root manifest's caret resolves to a version
      # that hands back empty boards.
      - name: Install relay dependencies
        run: npm --prefix networking/websocket ci

      - name: Run full E2E suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-full
          path: playwright-report/
          retention-days: 7